# Server port
server.port=8080

# Database Configuration (PostgreSQL)
# Thay localhost:5432 bằng ip/port của bạn và gigaphonedb bằng tên DB bạn muốn tạo
spring.datasource.url=jdbc:postgresql://localhost:5433/alophone
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA/Hibernate configurations
# update: Tự động tạo bảng dựa trên class Java nếu chưa tồn tại
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true